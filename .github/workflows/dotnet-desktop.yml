name: .NET Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore CybersecurityChatbotWPF.sln

    - name: Build project
      run: dotnet build CybersecurityChatbotWPF.sln --configuration Release --no-restore
